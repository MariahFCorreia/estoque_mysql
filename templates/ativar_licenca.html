{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Ativar Licença</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="chave_licenca" class="form-label">Chave de Licença</label>
                        <input type="text" class="form-control" id="chave_licenca" name="chave_licenca" 
                               placeholder="XXXX-XXXX-XXXX-XXXX" required>
                        <div class="form-text">Insira a chave de licença no formato XXXX-XXXX-XXXX-XXXX</div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Ativar Licença</button>
                    </div>
                </form>
                
                <div class="mt-3 text-center">
                    <small class="text-muted">
                        Não possui uma licença? <a href="#">Contate o administrador</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
