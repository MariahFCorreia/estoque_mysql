{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="text-center mb-0">Licença Ativada com Sucesso!</h3>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                </div>
                
                <h5>Sistema Liberado</h5>
                <p class="text-muted">{{ mensagem }}</p>
                
                <div class="card mb-3">
                    <div class="card-body">
                        <strong>Chave da Licença:</strong>
                        <code class="d-block mt-2 p-2 bg-light">{{ chave_licenca }}</code>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="bi bi-house"></i> Ir para o Sistema
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
