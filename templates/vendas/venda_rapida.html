{% extends "vendas/base_vendas.html" %}

{% block content_vendas %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-cart-plus me-2"></i>Venda Rápida</h2>
    <a href="{{ url_for('vendas.painel_vendas') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<div class="row">
    <div class="col-lg-8">
        <!-- Busca de Produtos -->
        <div class="card card-venda mb-4">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-search me-2"></i>Buscar Produto</h5>
            </div>
            <div class="card-body">
                <div class="input-group input-group-lg">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" 
                           placeholder="Digite código, nome ou descrição do produto..." 
                           id="buscaProdutoVenda"
                           autofocus>
                </div>
                <div id="resultadosProdutoVenda" class="mt-3"></div>
            </div>
        </div>

        <!-- Produto Selecionado -->
        <div class="card card-venda" id="cardProdutoSelecionado" style="display: none;">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-check-circle me-2"></i>Produto Selecionado</h5>
            </div>
            <div class="card-body">
                <div id="detalhesProdutoSelecionado"></div>
            </div>
        </div>
    </div>

    <div class="col-lg-4">
        <!-- Formulário de Venda -->
        <div class="card card-venda sticky-top" style="top: 20px;">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-receipt me-2"></i>Finalizar Venda</h5>
            </div>
            <div class="card-body">
                <form id="formVenda">
                    <!-- Cliente -->
                    <div class="mb-3">
                        <label for="clienteNome" class="form-label">Cliente</label>
                        <input type="text" class="form-control" id="clienteNome" 
                               value="Consumidor Final" placeholder="Nome do cliente">
                    </div>

                    <!-- Produto Info (preenchido automaticamente) -->
                    <div class="mb-3">
                        <label class="form-label">Produto</label>
                        <div id="infoProduto" class="text-muted">
                            Nenhum produto selecionado
                        </div>
                    </div>

                    <!-- Quantidade -->
                    <div class="mb-3">
                        <label for="quantidadeVenda" class="form-label">Quantidade</label>
                        <input type="number" class="form-control" id="quantidadeVenda" 
                               value="1" min="1" required>
                    </div>

                    <!-- Preço Unitário -->
                    <div class="mb-3">
                        <label for="precoUnitario" class="form-label">Preço Unitário</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="number" class="form-control" id="precoUnitario" 
                                   step="0.01" min="0" required readonly>
                        </div>
                    </div>

                    <!-- Valor Total -->
                    <div class="mb-3">
                        <label class="form-label">Valor Total</label>
                        <div class="fs-4 fw-bold text-success" id="valorTotal">
                            R$ 0,00
                        </div>
                    </div>

                    <!-- Botão Finalizar -->
                    <button type="submit" class="btn btn-vendas btn-lg w-100" id="btnFinalizar" disabled>
                        <i class="bi bi-check-circle"></i> Finalizar Venda
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Sucesso -->
<div class="modal fade" id="modalSucesso" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="bi bi-check-circle"></i> Venda Realizada!</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <i class="bi bi-cart-check display-1 text-success mb-3"></i>
                <h4 id="mensagemSucesso"></h4>
                <p class="text-muted" id="detalhesSucesso"></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Continuar Vendendo</button>
                <a href="{{ url_for('vendas.painel_vendas') }}" class="btn btn-success">Ir para Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts_vendas %}
<script>
let produtoSelecionado = null;

// Busca de produtos
document.getElementById('buscaProdutoVenda').addEventListener('input', function() {
    const query = this.value.trim();
    const resultados = document.getElementById('resultadosProdutoVenda');
    
    if (query.length < 2) {
        resultados.innerHTML = '';
        return;
    }
    
    resultados.innerHTML = `
        <div class="text-center">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Buscando...</span>
            </div>
            <p class="text-muted mt-2">Buscando produtos...</p>
        </div>
    `;
    
    fetch(`/api/produtos-venda?q=${encodeURIComponent(query)}`)
        .then(response => response.json())
        .then(produtos => {
            if (produtos.length === 0) {
                resultados.innerHTML = `
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle"></i>
                        Nenhum produto encontrado para "${query}"
                    </div>
                `;
                return;
            }
            
            resultados.innerHTML = produtos.map(produto => `
                <div class="card mb-2 card-venda produto-item" data-produto='${JSON.stringify(produto).replace(/'/g, "&#39;")}'>
                    <div class="card-body py-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="flex-grow-1">
                                <h6 class="mb-1 text-dark">${produto.descricao}</h6>
                                <small class="text-muted">
                                    <i class="bi bi-upc"></i> Código: ${produto.codigo} | 
                                    <i class="bi bi-box"></i> Estoque: ${produto.quantidade}
                                    ${produto.quantidade <= produto.estoque_minimo ? '<span class="badge bg-danger ms-2">Estoque Baixo</span>' : ''}
                                </small>
                            </div>
                            <div class="text-end ms-3">
                                <strong class="text-success fs-5">R$ ${parseFloat(produto.preco_unitario).toFixed(2)}</strong>
                                <br>
                                <button class="btn btn-sm btn-vendas mt-1 btn-selecionar"
                                        ${produto.quantidade <= 0 ? 'disabled' : ''}>
                                    <i class="bi bi-cart-plus"></i> Selecionar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Adicionar eventos de clique
            document.querySelectorAll('.btn-selecionar').forEach(btn => {
                btn.addEventListener('click', function() {
                    const card = this.closest('.produto-item');
                    const produtoData = JSON.parse(card.getAttribute('data-produto').replace(/&#39;/g, "'"));
                    selecionarProduto(produtoData);
                });
            });
        });
});

// Selecionar produto
function selecionarProduto(produto) {
    produtoSelecionado = produto;
    
    // Mostrar card do produto selecionado
    document.getElementById('cardProdutoSelecionado').style.display = 'block';
    document.getElementById('detalhesProdutoSelecionado').innerHTML = `
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h5 class="text-dark">${produto.descricao}</h5>
                <p class="mb-1"><strong>Código:</strong> ${produto.codigo}</p>
                <p class="mb-1"><strong>Estoque:</strong> ${produto.quantidade} unidades</p>
                <p class="mb-0"><strong>Preço:</strong> R$ ${parseFloat(produto.preco_unitario).toFixed(2)}</p>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="removerProduto()">
                <i class="bi bi-x-circle"></i> Remover
            </button>
        </div>
    `;
    
    // Preencher formulário
    document.getElementById('infoProduto').innerHTML = `
        <strong>${produto.descricao}</strong><br>
        <small>Código: ${produto.codigo} | Estoque: ${produto.quantidade}</small>
    `;
    
    document.getElementById('precoUnitario').value = produto.preco_unitario;
    document.getElementById('quantidadeVenda').max = produto.quantidade;
    
    // Habilitar botão e calcular total
    document.getElementById('btnFinalizar').disabled = false;
    calcularTotal();
}

// Remover produto selecionado
function removerProduto() {
    produtoSelecionado = null;
    document.getElementById('cardProdutoSelecionado').style.display = 'none';
    document.getElementById('infoProduto').innerHTML = 'Nenhum produto selecionado';
    document.getElementById('precoUnitario').value = '';
    document.getElementById('valorTotal').textContent = 'R$ 0,00';
    document.getElementById('btnFinalizar').disabled = true;
    document.getElementById('buscaProdutoVenda').value = '';
    document.getElementById('resultadosProdutoVenda').innerHTML = '';
}

// Calcular valor total
function calcularTotal() {
    if (!produtoSelecionado) return;
    
    const quantidade = parseInt(document.getElementById('quantidadeVenda').value) || 0;
    const precoUnitario = parseFloat(produtoSelecionado.preco_unitario);
    const valorTotal = quantidade * precoUnitario;
    
    document.getElementById('valorTotal').textContent = `R$ ${valorTotal.toFixed(2).replace('.', ',')}`;
}

// Eventos
document.getElementById('quantidadeVenda').addEventListener('input', calcularTotal);

// Finalizar venda
document.getElementById('formVenda').addEventListener('submit', function(e) {
    e.preventDefault();
    
    if (!produtoSelecionado) {
        alert('Selecione um produto primeiro!');
        return;
    }
    
    const quantidade = parseInt(document.getElementById('quantidadeVenda').value);
    const clienteNome = document.getElementById('clienteNome').value;
    
    if (quantidade > produtoSelecionado.quantidade) {
        alert(`Estoque insuficiente! Disponível: ${produtoSelecionado.quantidade}`);
        return;
    }
    
    // Desabilitar botão e mostrar loading
    const btn = document.getElementById('btnFinalizar');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-arrow-repeat spinner-border spinner-border-sm"></i> Processando...';
    
    // Enviar venda
    fetch('/venda/finalizar', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            produto_id: produtoSelecionado.id,
            quantidade: quantidade,
            cliente_nome: clienteNome
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Mostrar modal de sucesso
            document.getElementById('mensagemSucesso').textContent = data.mensagem;
            document.getElementById('detalhesSucesso').textContent = `Código: ${data.codigo_venda} | Cliente: ${clienteNome}`;
            
            const modal = new bootstrap.Modal(document.getElementById('modalSucesso'));
            modal.show();
            
            // Limpar formulário
            removerProduto();
            document.getElementById('clienteNome').value = 'Consumidor Final';
            document.getElementById('quantidadeVenda').value = 1;
            document.getElementById('buscaProdutoVenda').focus();
            
        } else {
            alert('Erro: ' + data.error);
        }
    })
    .catch(error => {
        alert('Erro de conexão: ' + error);
    })
    .finally(() => {
        // Restaurar botão
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-circle"></i> Finalizar Venda';
    });
});

// Focar na busca ao carregar a página
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('buscaProdutoVenda').focus();
});
</script>
{% endblock %}
